<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnex · Control de Turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F3F5F6;
  --surface:#FFFFFF;
  --ink:#16222B;
  --ink-soft:#5B6B76;
  --primary:#0F3D3E;
  --primary-light:#186B69;
  --accent:#E8A33D;
  --danger:#C1443A;
  --danger-bg:#FBEAE8;
  --success:#2E7D5B;
  --success-bg:#E9F5EF;
  --border:#E1E6E9;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif;}
.num{font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:var(--primary-light);}

/* ---- layout shells ---- */
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 34px;width:100%;max-width:400px;box-shadow:0 20px 50px -20px rgba(15,61,62,0.25);}
.brand-mark{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.brand-mark .dot-ring{width:34px;height:34px;border-radius:50%;border:3px solid var(--primary);position:relative;flex:none;}
.brand-mark .dot-ring::after{content:'';position:absolute;width:3px;height:11px;background:var(--accent);top:5px;left:calc(50% - 1.5px);border-radius:2px;transform-origin:bottom center;transform:rotate(35deg);}
.brand-mark .name{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:-0.02em;}
.brand-mark .sub{font-size:11px;color:var(--ink-soft);margin-top:-2px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(24,107,105,0.12);}
.row{display:flex;gap:12px;}
.row > .field{flex:1;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;border:none;font-weight:600;font-size:13.5px;transition:filter .12s;}
.btn:hover{filter:brightness(1.07);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);color:#241A05;}
.btn-ghost{background:transparent;color:var(--primary);border:1px solid var(--border);}
.btn-danger{background:var(--danger-bg);color:var(--danger);}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:6px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.tabbar{display:flex;gap:6px;margin-bottom:18px;background:#EAEDEE;padding:4px;border-radius:10px;width:fit-content;}
.tabbar button{padding:8px 14px;border:none;background:transparent;border-radius:7px;font-weight:600;color:var(--ink-soft);font-size:13px;}
.tabbar button.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08);}

.msg{padding:9px 12px;border-radius:7px;font-size:13px;margin-bottom:14px;}
.msg-err{background:var(--danger-bg);color:var(--danger);}
.msg-ok{background:var(--success-bg);color:var(--success);}

/* ---- app shell ---- */
.shell{display:flex;min-height:100vh;}
.sidebar{width:220px;flex:none;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:20px 14px;}
.sidebar .brand-mark .name,.sidebar .brand-mark .sub{color:#fff;}
.sidebar .brand-mark .dot-ring{border-color:#fff;}
.sidebar .brand-mark .dot-ring::after{background:var(--accent);}
.sidebar nav{margin-top:10px;display:flex;flex-direction:column;gap:2px;}
.sidebar nav button{text-align:left;padding:10px 12px;border:none;background:transparent;color:rgba(255,255,255,0.75);border-radius:8px;font-weight:600;font-size:13.5px;}
.sidebar nav button.active{background:rgba(255,255,255,0.14);color:#fff;}
.sidebar nav button:hover{background:rgba(255,255,255,0.1);color:#fff;}
.sidebar .who{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.15);font-size:12px;color:rgba(255,255,255,0.6);}
.sidebar .who b{color:#fff;display:block;font-size:13px;margin-bottom:8px;}
.main{flex:1;padding:30px 36px;max-width:1180px;}
.main h1{font-size:22px;margin:0 0 4px;}
.main .lead{color:var(--ink-soft);font-size:13.5px;margin:0 0 22px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px;}
.card h3{margin:0 0 16px;font-size:15px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:900px){.grid2{grid-template-columns:1fr;} .shell{flex-direction:column;} .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;} .sidebar nav{flex-direction:row;flex-wrap:wrap;} .sidebar .who{width:100%;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.15);}}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 10px;color:var(--ink-soft);font-weight:600;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.02em;}
td{padding:9px 10px;border-bottom:1px solid #EEF1F2;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}
.pill-ok{background:var(--success-bg);color:var(--success);}
.pill-off{background:#EEE;color:#888;}
.pill-sched{background:#E7EEFB;color:#2E5FA8;}
.pill-done{background:var(--success-bg);color:var(--success);}
.pill-absent{background:var(--danger-bg);color:var(--danger);}
.pill-cancel{background:#EEE;color:#888;}
.pill-pending{background:#FDF3E4;color:#946200;}
.pill-progress{background:#E7EEFB;color:#2E5FA8;}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.toolbar .actions{display:flex;gap:8px;flex-wrap:wrap;}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-head h3{margin:0;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding-bottom:4px;text-transform:uppercase;}
.cal-cell{min-height:78px;border:1px solid var(--border);border-radius:8px;padding:6px;background:#fbfcfc;cursor:pointer;transition:border-color .1s;}
.cal-cell:hover{border-color:var(--primary-light);}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border-color:var(--accent);border-width:2px;}
.cal-cell .d{font-size:12px;font-weight:700;color:var(--ink-soft);}
.cal-cell .shift-tag{font-size:10.5px;background:var(--primary);color:#fff;border-radius:4px;padding:1px 5px;margin-top:3px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-cell .shift-tag.absent{background:var(--danger);}
.cal-cell .shift-tag.done{background:var(--success);}
.cal-cell .more{font-size:10px;color:var(--ink-soft);margin-top:2px;}

.modal-bg{position:fixed;inset:0;background:rgba(15,25,30,0.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50;}
.modal{background:#fff;border-radius:14px;padding:26px 28px;width:100%;max-width:520px;box-shadow:0 30px 60px -20px rgba(0,0,0,.35);}
.modal h3{margin-top:0;}
.modal-close{float:right;border:none;background:transparent;font-size:18px;color:var(--ink-soft);}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:13.5px;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.kpi .v{font-size:24px;font-weight:700;color:var(--primary);font-family:'Space Grotesk',sans-serif;}
.kpi .l{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-scroll table{min-width:560px;}
.badge-photo{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:#EEF2F3;color:var(--ink-soft);padding:2px 7px;border-radius:12px;margin-left:6px;}
.photo-thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin:4px 4px 0 0;}
.clock-btn{display:inline-flex;align-items:center;gap:6px;}
.locked-note{font-size:12px;color:var(--ink-soft);background:#F3F5F6;border:1px dashed var(--border);border-radius:8px;padding:8px 10px;margin-top:8px;}

@media (max-width:600px){
  .main{padding:16px;}
  .main h1{font-size:19px;}
  .card{padding:16px;border-radius:10px;}
  .row{flex-direction:column;gap:0;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .modal{padding:20px 18px;border-radius:12px;}
  .modal-bg{padding:16px 8px;align-items:center;}
  .auth-card{padding:24px 20px;}
  .cal-cell{min-height:52px;padding:4px;}
  .cal-cell .shift-tag{font-size:9px;padding:0 3px;margin-top:2px;}
  .cal-dow{font-size:9.5px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar .actions{flex-direction:column;}
  .toolbar .actions .btn{width:100%;}
  .tabbar{flex-wrap:wrap;width:100%;}
  .sidebar{padding:14px 10px;}
  .sidebar nav button{padding:8px 10px;font-size:12.5px;}
}
.small{font-size:12px;color:var(--ink-soft);}
.link-btn{background:none;border:none;color:var(--primary-light);font-weight:600;padding:0;font-size:13px;}
hr.sep{border:none;border-top:1px solid var(--border);margin:18px 0;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   TURNEX — App de control de turnos multi-empresa
   Vanilla JS + Supabase. Todo el estado vive en APP.* y se re-renderiza
   con funciones render*() que escriben innerHTML de #app.
   ===================================================================== */

const APP = {
  sb: null,
  session: null,      // {type:'owner'|'admin'|'employee', id, company_id, full_name, must_change_password}
  companiesForLogin: [],
  ratesCache: [],
  companiesCache: [],
  cache: {},           // cache genérico por id para lookups en handlers inline
  calRef: new Date(),  // mes visible en calendario admin
  calRefEmp: new Date(),
  ownerTab: 'empresas',
  adminTab: 'empleados',
  empTab: 'turnos',
  ownerCompanyFocus: null, // empresa seleccionada en tab Administradores
};

const COUNTRIES = [
  {code:'CO', name:'Colombia'},
  {code:'US', name:'Estados Unidos'},
  {code:'ES', name:'España'},
  {code:'MX', name:'México'},
  {code:'AR', name:'Argentina'},
  {code:'DE', name:'Alemania'},
  {code:'FR', name:'Francia'},
  {code:'OT', name:'Otro'},
];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function $(sel){ return document.querySelector(sel); }
function esc(s){ return (s===null||s===undefined) ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return 'x'+Math.random().toString(36).slice(2,10); }
function saveCache(obj){ const id = uid(); APP.cache[id] = obj; return id; }
function fmtMoney(n, cur){ return (Number(n)||0).toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ' + cur; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function tok(){ return localStorage.getItem('turnex_token'); }

/* ------------------------- INIT / CONFIG ------------------------- */
window.addEventListener('load', init);

function buildClient(url, key, token){
  const opts = token ? { global: { headers: { 'x-session-token': token } } } : {};
  return supabase.createClient(url, key, opts);
}
function applySessionHeader(token){
  const url = localStorage.getItem('turnex_sb_url');
  const key = localStorage.getItem('turnex_sb_key');
  if(token) localStorage.setItem('turnex_token', token);
  APP.sb = buildClient(url, key, token);
}

async function init(){
  const url = localStorage.getItem('turnex_sb_url');
  const key = localStorage.getItem('turnex_sb_key');
  if(!url || !key){ renderSetup(); return; }
  const savedToken = localStorage.getItem('turnex_token');
  try{
    APP.sb = buildClient(url, key, savedToken);
  }catch(e){ renderSetup('No se pudo inicializar Supabase. Revisa la URL y la llave.'); return; }
  const sess = localStorage.getItem('turnex_session');
  if(sess && savedToken){
    try{
      APP.session = JSON.parse(sess);
      await routeToDashboard();
      return;
    }catch(e){ localStorage.removeItem('turnex_session'); localStorage.removeItem('turnex_token'); }
  }
  renderLogin();
}

function renderSetup(err){
  document.title = 'Turnex · Configuración';
  $('#app').innerHTML = `
  <div class="center-screen">
    <div class="auth-card">
      ${brandMark()}
      <h3 style="margin-top:0;font-size:15px;">Conectar con Supabase</h3>
      <p class="small" style="margin-top:-8px;">Pega la URL y la llave anónima ("anon public") de tu proyecto Supabase. Se guardan solo en este navegador.</p>
      ${err? `<div class="msg msg-err">${esc(err)}</div>`:''}
      <div class="field"><label>Supabase URL</label><input id="cfgUrl" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Supabase anon public key</label><input id="cfgKey" placeholder="eyJhbGciOi..."></div>
      <button class="btn btn-primary btn-block" onclick="saveConfig()">Guardar y continuar</button>
      <p class="small" style="margin-top:14px;">¿Primera vez? Corre <code>schema.sql</code> en el SQL Editor de tu proyecto Supabase antes de continuar, y crea el propietario con <code>select bootstrap_owner('usuario','clave','Nombre');</code></p>
    </div>
  </div>`;
}
function saveConfig(){
  const url = $('#cfgUrl').value.trim();
  const key = $('#cfgKey').value.trim();
  if(!url || !key){ return; }
  localStorage.setItem('turnex_sb_url', url);
  localStorage.setItem('turnex_sb_key', key);
  location.reload();
}

function brandMark(){
  return `<div class="brand-mark"><div class="dot-ring"></div><div><div class="name">Turnex</div><div class="sub">Control de turnos</div></div></div>`;
}

/* ------------------------- LOGIN ------------------------- */
let loginMode = 'empresa';
async function renderLogin(msg, isErr){
  document.title = 'Turnex · Ingresar';
  if(APP.companiesForLogin.length===0){
    try{
      const {data} = await APP.sb.from('companies_public').select('id,name').order('name');
      APP.companiesForLogin = data || [];
    }catch(e){}
  }
  $('#app').innerHTML = `
  <div class="center-screen">
    <div class="auth-card">
      ${brandMark()}
      <div class="tabbar">
        <button class="${loginMode==='empresa'?'active':''}" onclick="loginMode='empresa';renderLogin()">Empresa</button>
        <button class="${loginMode==='owner'?'active':''}" onclick="loginMode='owner';renderLogin()">Propietario</button>
      </div>
      ${msg? `<div class="msg ${isErr?'msg-err':'msg-ok'}">${esc(msg)}</div>`:''}
      ${loginMode==='empresa' ? loginEmpresaForm() : loginOwnerForm()}
      <p class="small" style="margin-top:16px;text-align:center;"><button class="link-btn" onclick="renderSetup()">Cambiar conexión Supabase</button></p>
    </div>
  </div>`;
}
function loginEmpresaForm(){
  return `
    <div class="field"><label>Empresa</label>
      <select id="loginCompany">
        ${APP.companiesForLogin.length===0? '<option value="">No hay empresas registradas</option>' : APP.companiesForLogin.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Usuario</label><input id="loginUser" placeholder="ID de usuario"></div>
    <div class="field"><label>Clave</label><input id="loginPass" type="password" placeholder="Clave de acceso"></div>
    <button class="btn btn-primary btn-block" onclick="doCompanyLogin()">Ingresar</button>`;
}
function loginOwnerForm(){
  return `
    <div class="field"><label>Usuario propietario</label><input id="loginOwnerUser"></div>
    <div class="field"><label>Clave</label><input id="loginOwnerPass" type="password"></div>
    <button class="btn btn-primary btn-block" onclick="doOwnerLogin()">Ingresar como propietario</button>`;
}

async function doOwnerLogin(){
  const username = $('#loginOwnerUser').value.trim();
  const password = $('#loginOwnerPass').value;
  if(!username||!password) return renderLogin('Completa usuario y clave', true);
  const {data, error} = await APP.sb.rpc('login_owner', {p_username: username, p_password: password});
  if(error || !data || data.length===0) return renderLogin('Usuario o clave incorrectos', true);
  applySessionHeader(data[0].token);
  APP.session = {type:'owner', id: data[0].id, full_name: data[0].full_name};
  localStorage.setItem('turnex_session', JSON.stringify(APP.session));
  routeToDashboard();
}
async function doCompanyLogin(){
  const companyId = $('#loginCompany').value;
  const username = $('#loginUser').value.trim();
  const password = $('#loginPass').value;
  if(!companyId) return renderLogin('Selecciona una empresa', true);
  if(!username||!password) return renderLogin('Completa usuario y clave', true);
  const {data, error} = await APP.sb.rpc('login_company_user', {p_company_id: companyId, p_username: username, p_password: password});
  if(error || !data || data.length===0) return renderLogin('Usuario o clave incorrectos', true);
  const row = data[0];
  applySessionHeader(row.token);
  APP.session = {type: row.role, id: row.id, company_id: row.company_id, full_name: row.full_name, must_change_password: row.must_change_password};
  localStorage.setItem('turnex_session', JSON.stringify(APP.session));
  routeToDashboard();
}
function logout(){
  const token = localStorage.getItem('turnex_token');
  if(token && APP.sb){ APP.sb.rpc('logout_session', {p_token: token}).catch(()=>{}); }
  localStorage.removeItem('turnex_session');
  localStorage.removeItem('turnex_token');
  APP.session = null;
  location.reload();
}

async function routeToDashboard(){
  if(!APP.session) return renderLogin();
  if(APP.session.type==='owner') return renderOwner();
  if(APP.session.must_change_password) return renderForceChangePassword();
  if(APP.session.type==='admin') return renderAdmin();
  if(APP.session.type==='employee') return renderEmployee();
  renderLogin();
}

function renderForceChangePassword(){
  document.title = 'Turnex · Cambiar clave';
  $('#app').innerHTML = `
  <div class="center-screen">
    <div class="auth-card">
      ${brandMark()}
      <h3 style="margin-top:0;">Primer ingreso: define tu clave</h3>
      <p class="small">Por seguridad debes establecer una nueva clave personal antes de continuar.</p>
      <div id="fcpMsg"></div>
      <div class="field"><label>Nueva clave</label><input id="fcpPass" type="password"></div>
      <div class="field"><label>Confirmar clave</label><input id="fcpPass2" type="password"></div>
      <button class="btn btn-primary btn-block" onclick="submitForceChange()">Guardar clave y continuar</button>
    </div>
  </div>`;
}
async function submitForceChange(){
  const p1 = $('#fcpPass').value, p2 = $('#fcpPass2').value;
  if(!p1 || p1.length<4) return $('#fcpMsg').innerHTML = `<div class="msg msg-err">La clave debe tener al menos 4 caracteres.</div>`;
  if(p1!==p2) return $('#fcpMsg').innerHTML = `<div class="msg msg-err">Las claves no coinciden.</div>`;
  await APP.sb.rpc('set_company_user_password', {p_token: tok(), p_user_id: APP.session.id, p_new_password: p1});
  APP.session.must_change_password = false;
  localStorage.setItem('turnex_session', JSON.stringify(APP.session));
  routeToDashboard();
}

/* ------------------------- SHELL ------------------------- */
function shell(navHtml, bodyHtml, roleLabel){
  return `
  <div class="shell">
    <div class="sidebar">
      ${brandMark()}
      <nav>${navHtml}</nav>
      <div class="who"><b>${esc(APP.session.full_name||'')}</b>${roleLabel}<br><button class="link-btn" style="color:#fff;opacity:.75;margin-top:10px;" onclick="logout()">Cerrar sesión →</button></div>
    </div>
    <div class="main">${bodyHtml}</div>
  </div>`;
}

/* =====================================================================
   VISTA PROPIETARIO
   ===================================================================== */
async function renderOwner(){
  document.title = 'Turnex · Propietario';
  const tabs = [['empresas','Empresas'],['admins','Administradores'],['liquidaciones','Liquidaciones cerradas'],['backups','Copias de seguridad'],['cuenta','Mi cuenta']];
  const nav = tabs.map(([k,l])=>`<button class="${APP.ownerTab===k?'active':''}" onclick="APP.ownerTab='${k}';renderOwner()">${l}</button>`).join('');
  let body = '<div class="empty-state">Cargando…</div>';
  $('#app').innerHTML = shell(nav, `<h1>Panel del propietario</h1><p class="lead">Control global de empresas, administradores y parámetros.</p>${body}`, 'Propietario');

  if(APP.ownerTab==='empresas') body = await ownerEmpresasTab();
  else if(APP.ownerTab==='admins') body = await ownerAdminsTab();
  else if(APP.ownerTab==='liquidaciones') body = await ownerPayrollRunsTab();
  else if(APP.ownerTab==='backups') body = await ownerBackupsTab();
  else if(APP.ownerTab==='cuenta') body = ownerAccountTab();

  $('.main').innerHTML = `<h1>Panel del propietario</h1><p class="lead">Control global de empresas, administradores y parámetros.</p>${body}`;
}

async function ownerEmpresasTab(){

async function submitCompany(existingId){
  const payload = {
    name: $('#cName').value.trim(),
    legal_id: $('#cLegalId').value.trim(),
    country: $('#cCountry').value,
    city: $('#cCity').value.trim(),
    default_currency: ($('#cCurrency').value.trim()||'USD').toUpperCase(),

    email: $('#cEmail').value.trim(),
    address: $('#cAddress').value.trim(),
    max_employees: parseInt($('#cMaxEmployees').value, 10) || 50,
  };
  if(!payload.name) return $('#companyModalMsg').innerHTML = `<div class="msg msg-err">El nombre es obligatorio.</div>`;

  if(error) return $('#companyModalMsg').innerHTML = `<div class="msg msg-err">${esc(error.message)}</div>`;
  closeModal('companyModal');

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');

async function adminNominaTab(){
  await refreshAbsences();
  const today = new Date();
  const defStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0,10);
  const defEnd = new Date(today.getFullYear(), today.getMonth()+1, 0).toISOString().slice(0,10);
  return `

    <p class="small">Las horas se toman de la marcación real de entrada/salida cuando existe; si un turno fue marcado "Completado" manualmente sin marcación, se usa el horario programado.</p>
    <div class="row">
      <div class="field"><label>Desde</label><input type="date" id="pStart" value="${defStart}"></div>
      <div class="field"><label>Hasta</label><input type="date" id="pEnd" value="${defEnd}"></div>
    </div>
    <button class="btn btn-primary" onclick="calcPayroll()">Calcular liquidación</button>
    <div id="payrollResult" style="margin-top:18px;"></div>
  </div>`;
}
async function calcPayroll(){
  const start = $('#pStart').value, end = $('#pEnd').value;
  const box = $('#payrollResult');
  box.innerHTML = `<p class="small">Calculando…</p>`;

  const {data: existingRun} = await APP.sb.from('payroll_runs').select('*').eq('company_id', APP.session.company_id)
    .lte('period_start', end).gte('period_end', start);
  const isLocked = existingRun && existingRun.length>0;

  const emps = await getEmployeesFull();
  const {data: shifts} = await APP.sb.from('shifts').select('*, time_entries(*)').eq('company_id', APP.session.company_id).gte('shift_date', start).lte('shift_date', end).eq('status','completed');
  const {data: manualEntries} = await APP.sb.from('time_entries').select('*').eq('company_id', APP.session.company_id).gte('work_date', start).lte('work_date', end).is('shift_id', null);

  const days = (new Date(end) - new Date(start)) / (1000*3600*24) + 1;
  const weeks = Math.max(days/7, 0.01);

  const results = emps.map(e=>{
    const empShifts = (shifts||[]).filter(s=>s.employee_id===e.id);
    let hours = empShifts.reduce((sum,s)=>{
      const entry = (s.time_entries||[])[0];
      if(entry && entry.hours_worked){ return sum + Number(entry.hours_worked); }
      const [sh,sm] = s.start_time.split(':').map(Number);
      const [eh,em] = s.end_time.split(':').map(Number);
      let diff = (eh*60+em) - (sh*60+sm);
      if(diff<0) diff += 24*60;
      return sum + diff/60;
    }, 0);
    const manual = (manualEntries||[]).filter(m=>m.employee_id===e.id).reduce((s,m)=>s+Number(m.hours_worked||0),0);
    hours += manual;
    const contracted = e.contracted_hours_week * weeks;
    const compliance = contracted>0 ? Math.min((hours/contracted)*100, 999) : 0;
    const amount = hours * Number(e.hourly_rate||0);
    return {name: e.app_users?.full_name, position:e.position, hours, contracted, compliance, currency:e.currency, amount};
  });

  APP.cache['_payrollResults'] = results;
  APP.cache['_payrollRange'] = {start, end};
  const rows = results.map(r=>`<tr><td><b>${esc(r.name)}</b><div class="small">${esc(r.position||'')}</div></td>
    <td class="num">${r.hours.toFixed(1)} h</td>
    <td class="num">${r.contracted.toFixed(1)} h</td>
    <td class="num">${r.compliance.toFixed(0)}%</td>
    <td class="num"><b>${fmtMoney(r.amount, r.currency)}</b></td></tr>`).join('');
  const total = results.reduce((s,r)=>s+r.amount,0);
  const mainCurrency = results[0]?.currency || APP.companiesCache?.[0]?.default_currency || '';
  box.innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="v num">${results.length}</div><div class="l">Empleados liquidados</div></div>
      <div class="kpi"><div class="v num">${fmtMoney(total, mainCurrency)}</div><div class="l">Total nómina del periodo</div></div>
    </div>
    ${isLocked ? `<div class="locked-note">🔒 Ya existe una liquidación <b>cerrada</b> que se cruza con este periodo. Solo el propietario puede reabrirla para volver a procesarla. Aún puedes exportar esta vista previa a Excel.</div>` : ''}
    <div class="toolbar"><div></div><div class="actions">
      <button class="btn btn-accent" onclick="exportPayroll()">Exportar a Excel</button>
      <button class="btn btn-primary" ${isLocked?'disabled':''} onclick="confirmClosePayroll('${start}','${end}','${esc(mainCurrency)}', ${total}, ${results.length})">Cerrar liquidación de este periodo</button>
    </div></div>
    <div class="table-scroll"><table><thead><tr><th>Empleado</th><th>Horas trabajadas</th><th>Horas pactadas</th><th>Cumplimiento</th><th>Monto a pagar</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="5" class="empty-state">No hay empleados o turnos completados en este rango.</td></tr>'}</tbody></table></div>`;
}
async function confirmClosePayroll(start, end, currency, total, count){
  if(!confirm(`¿Cerrar la liquidación del ${start} al ${end}? Una vez cerrada, no podrás volver a procesarla — solo el propietario podrá reabrirla.`)) return;
  const {error} = await APP.sb.rpc('close_payroll_run', {p_token: tok(), p_period_start: start, p_period_end: end, p_currency: currency, p_total: total, p_employee_count: count});
  if(error) return alert(error.message);
  alert('Liquidación cerrada correctamente.');
  calcPayroll();
}
function exportPayroll(){
  const results = APP.cache['_payrollResults']||[];
  const data = results.map(r=>({
    Empleado: r.name, Cargo: r.position, 'Horas trabajadas': +r.hours.toFixed(2), 'Horas pactadas': +r.contracted.toFixed(2),
    'Cumplimiento %': +r.compliance.toFixed(1), Moneda: r.currency, 'Monto a pagar': +r.amount.toFixed(2)
  }));
  exportToExcel(`nomina_${todayISO()}.xlsx`, data);
}

      <button class="btn btn-ghost" onclick="reportEmpleados()">Empleados</button>
      <button class="btn btn-ghost" onclick="reportUbicaciones()">Ubicaciones</button>
      <button class="btn btn-ghost" onclick="reportTareas()">Tareas</button>
      <button class="btn btn-ghost" onclick="openReportShiftsModal()">Turnos y horas por rango de fechas</button>
      <button class="btn btn-ghost" onclick="openReportAbsencesModal()">Inasistencias por rango de fechas</button>
    </div></div>
  </div>`;
}
async function reportEmpleados(){
  const emps = await getEmployeesFull();
  const data = emps.map(e=>({Nombre:e.app_users?.full_name, Usuario:e.app_users?.username, Correo:e.app_users?.email, Cargo:e.position, Ubicacion:e.locations?.name, Tarifa_hora:e.hourly_rate, Moneda:e.currency, Horas_semana:e.contracted_hours_week, Ingreso:e.hire_date, Activo: e.app_users?.active?'Sí':'No'}));
  exportToExcel(`empleados_${todayISO()}.xlsx`, data);
}
async function reportUbicaciones(){
  const locs = await getLocations();
  exportToExcel(`ubicaciones_${todayISO()}.xlsx`, locs.map(l=>({Nombre:l.name, Ciudad:l.city, Pais:l.country, Direccion:l.address, Activa:l.active?'Sí':'No'})));
}
async function reportTareas(){
  const {data: tasks} = await APP.sb.from('tasks').select('*, employees:employee_id(*, app_users:user_id(full_name))').eq('company_id', APP.session.company_id);
  exportToExcel(`tareas_${todayISO()}.xlsx`, (tasks||[]).map(t=>({Titulo:t.title, Descripcion:t.description, Asignado_a:t.employees?.app_users?.full_name||'—', Vence:t.due_date, Estado:t.status, Requiere_foto:t.requires_photo?'Sí':'No'})));
}
function openReportShiftsModal(){
  const modal = document.createElement('div'); modal.className='modal-bg'; modal.id='repShiftModal';
  modal.innerHTML = `<div class="modal"><button class="modal-close" onclick="closeModal('repShiftModal')">✕</button>
  <h3>Exportar turnos y horas por rango de fechas</h3>
  <div class="row"><div class="field"><label>Desde</label><input type="date" id="rsStart" value="${todayISO()}"></div>
  <div class="field"><label>Hasta</label><input type="date" id="rsEnd" value="${todayISO()}"></div></div>
  <button class="btn btn-primary btn-block" onclick="reportShifts()">Exportar</button>
  </div>`;
  document.body.appendChild(modal);
}
async function reportShifts(){
  const start = $('#rsStart').value, end = $('#rsEnd').value;
  await refreshAbsences();
  const {data: shifts} = await APP.sb.from('shifts').select('*, employees:employee_id(*, app_users:user_id(full_name)), locations:location_id(name), time_entries(*)').eq('company_id', APP.session.company_id).gte('shift_date', start).lte('shift_date', end).order('shift_date');
  exportToExcel(`turnos_${start}_a_${end}.xlsx`, (shifts||[]).map(s=>{
    const te = (s.time_entries||[])[0];
    return {Fecha:s.shift_date, Empleado:s.employees?.app_users?.full_name, Ubicacion:s.locations?.name||'—',
      Inicio_programado:s.start_time, Fin_programado:s.end_time, Estado:s.status,
      Entrada_marcada: te?.clock_in ? new Date(te.clock_in).toLocaleString('es-CO') : '—',
      Salida_marcada: te?.clock_out ? new Date(te.clock_out).toLocaleString('es-CO') : '—',
      Horas_reales: te?.hours_worked || '—', Notas:s.notes};
  }));
  closeModal('repShiftModal');
}
function openReportAbsencesModal(){
  const modal = document.createElement('div'); modal.className='modal-bg'; modal.id='repAbsModal';
  modal.innerHTML = `<div class="modal"><button class="modal-close" onclick="closeModal('repAbsModal')">✕</button>
  <h3>Exportar inasistencias por rango de fechas</h3>
  <div class="row"><div class="field"><label>Desde</label><input type="date" id="raStart" value="${todayISO()}"></div>
  <div class="field"><label>Hasta</label><input type="date" id="raEnd" value="${todayISO()}"></div></div>
  <button class="btn btn-primary btn-block" onclick="reportAbsences()">Exportar</button>
  </div>`;
  document.body.appendChild(modal);
}
async function reportAbsences(){
  const start = $('#raStart').value, end = $('#raEnd').value;
  await refreshAbsences();
  const {data: shifts} = await APP.sb.from('shifts').select('*, employees:employee_id(*, app_users:user_id(full_name)), locations:location_id(name)')
    .eq('company_id', APP.session.company_id).eq('status','absent').gte('shift_date', start).lte('shift_date', end).order('shift_date');
  exportToExcel(`inasistencias_${start}_a_${end}.xlsx`, (shifts||[]).map(s=>({
    Fecha:s.shift_date, Empleado:s.employees?.app_users?.full_name, Cargo:s.employees?.position,
    Ubicacion:s.locations?.name||'—', Turno_programado:`${s.start_time?.slice(0,5)}–${s.end_time?.slice(0,5)}`, Notas:s.notes
  })));
  closeModal('repAbsModal');
}

function adminAccountTab(){
  return `<div class="card" style="max-width:420px;"><h3>Cambiar mi clave</h3><div id="apMsg"></div>
  <div class="field"><label>Nueva clave</label><input id="apPass" type="password"></div>
  <div class="field"><label>Confirmar</label><input id="apPass2" type="password"></div>
  <button class="btn btn-primary" onclick="submitAdminPass()">Actualizar clave</button></div>`;
}
async function submitAdminPass(){
  const p1=$('#apPass').value, p2=$('#apPass2').value;
  if(!p1||p1.length<4) return $('#apMsg').innerHTML=`<div class="msg msg-err">Mínimo 4 caracteres.</div>`;
  if(p1!==p2) return $('#apMsg').innerHTML=`<div class="msg msg-err">No coinciden.</div>`;
  await APP.sb.rpc('set_company_user_password', {p_token: tok(), p_user_id: APP.session.id, p_new_password:p1});
  $('#apMsg').innerHTML = `<div class="msg msg-ok">Clave actualizada.</div>`;
}

/* =====================================================================
   VISTA EMPLEADO (solo lectura + cambio de clave propia)
   ===================================================================== */
async function renderEmployee(){
  document.title = 'Turnex · Empleado';
  const tabs = [['turnos','Mis turnos'],['tareas','Mis tareas'],['cuenta','Mi cuenta']];
  const nav = tabs.map(([k,l])=>`<button class="${APP.empTab===k?'active':''}" onclick="APP.empTab='${k}';renderEmployee()">${l}</button>`).join('');
  $('#app').innerHTML = shell(nav, `<div class="empty-state">Cargando…</div>`, 'Empleado');
  const {data: empRow} = await APP.sb.from('employees').select('*').eq('user_id', APP.session.id).single();
  APP.cache['_myEmployee'] = empRow;
  let body = '';
  if(APP.empTab==='turnos') body = await empTurnosTab(empRow);
  else if(APP.empTab==='tareas') body = await empTareasTab(empRow);
  else if(APP.empTab==='cuenta') body = empAccountTab();
  $('.main').innerHTML = `<h1>Hola, ${esc(APP.session.full_name.split(' ')[0])}</h1><p class="lead">Consulta tus turnos programados y tareas asignadas.</p>${body}`;
}
async function empTurnosTab(empRow){
  if(!empRow) return `<div class="card"><div class="empty-state">Tu perfil de empleado aún no está vinculado. Contacta a tu administrador.</div></div>`;
  const y = APP.calRefEmp.getFullYear(), m = APP.calRefEmp.getMonth();
  const first = new Date(y,m,1), last = new Date(y,m+1,0);
  const startDow = first.getDay();
  const {data: shifts} = await APP.sb.from('shifts').select('*, locations:location_id(name), time_entries(*)').eq('employee_id', empRow.id)
    .gte('shift_date', first.toISOString().slice(0,10)).lte('shift_date', last.toISOString().slice(0,10)).order('shift_date');
  APP.cache['_myShifts'] = {};
  (shifts||[]).forEach(s=> APP.cache['_myShifts'][s.id]=s);
  const byDay = {};
  (shifts||[]).forEach(s=>{(byDay[s.shift_date]=byDay[s.shift_date]||[]).push(s);});
  let cells='';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=last.getDate(); d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayShifts = byDay[dateStr]||[];
    const isToday = dateStr===todayISO();
    const tags = dayShifts.map(s=>{
      const cls = s.status==='absent'?'absent':(s.status==='completed'?'done':'');
      return `<span class="shift-tag ${cls}">${s.start_time?.slice(0,5)}–${s.end_time?.slice(0,5)}</span>`;
    }).join('');
    cells += `<div class="cal-cell ${isToday?'today':''}"><div class="d">${d}</div>${tags}</div>`;
  }
  const rows = (shifts||[]).map(s=>{
    const entry = (s.time_entries||[])[0];
    let action = '—';
    if(s.status==='scheduled') action = `<button class="btn btn-primary btn-sm clock-btn" onclick="doClockIn('${s.id}')">Marcar entrada</button>`;
    else if(s.status==='in_progress') action = `<button class="btn btn-accent btn-sm clock-btn" onclick="doClockOut('${s.id}')">Marcar salida</button>`;
    else if(s.status==='completed') action = entry?.clock_in ? `${new Date(entry.clock_in).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})} – ${entry.clock_out? new Date(entry.clock_out).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'—'}` : 'Completado';
    return `<tr><td>${s.shift_date}</td><td class="num">${s.start_time?.slice(0,5)}–${s.end_time?.slice(0,5)}</td><td>${esc(s.locations?.name||'—')}</td><td>${statusPill(s.status)}</td><td style="text-align:right;">${action}</td></tr>`;
  }).join('');
  return `
  <div class="card">
    <div class="cal-head"><button class="btn btn-ghost btn-sm" onclick="empShiftMonth(-1)">‹ Anterior</button><h3>${MONTHS[m]} ${y}</h3><button class="btn btn-ghost btn-sm" onclick="empShiftMonth(1)">Siguiente ›</button></div>
    <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
  </div>
  <div class="card">
    <h3>Mis turnos y marcación</h3>
    <p class="small">Puedes marcar tu entrada desde 1 minuto antes de la hora programada por tu administrador.</p>
    <div id="clockMsg"></div>
    <div class="table-scroll"><table><thead><tr><th>Fecha</th><th>Horario</th><th>Ubicación</th><th>Estado</th><th></th></tr></thead>
    <tbody>${rows || '<tr><td colspan="5" class="empty-state">Sin turnos este mes.</td></tr>'}</tbody></table></div>
  </div>`;
}
async function doClockIn(shiftId){
  const {error} = await APP.sb.rpc('clock_in', {p_token: tok(), p_shift_id: shiftId});
  const box = $('#clockMsg');
  if(error){ if(box) box.innerHTML = `<div class="msg msg-err">${esc(error.message)}</div>`; return; }
  if(box) box.innerHTML = `<div class="msg msg-ok">Entrada marcada correctamente.</div>`;
  renderEmployee();
}
async function doClockOut(shiftId){
  const {error} = await APP.sb.rpc('clock_out', {p_token: tok(), p_shift_id: shiftId});
  const box = $('#clockMsg');
  if(error){ if(box) box.innerHTML = `<div class="msg msg-err">${esc(error.message)}</div>`; return; }
  if(box) box.innerHTML = `<div class="msg msg-ok">Salida marcada correctamente.</div>`;
  renderEmployee();
}
function empShiftMonth(delta){ APP.calRefEmp.setMonth(APP.calRefEmp.getMonth()+delta); renderEmployee(); }
async function empTareasTab(empRow){
  if(!empRow) return '';
  const {data: tasks} = await APP.sb.from('tasks').select('*, task_photos(*)').or(`employee_id.eq.${empRow.id},employee_id.is.null`).eq('company_id', APP.session.company_id).order('due_date');
  APP.cache['_myEmpId'] = empRow.id;
  const rows = (tasks||[]).map(t=>{
    const cid = saveCache(t);
    const myPhotos = (t.task_photos||[]).filter(p=>p.employee_id===empRow.id);
    return `<tr><td><b>${esc(t.title)}</b>${t.requires_photo?'<span class="badge-photo">📷 requiere foto</span>':''}<div class="small">${esc(t.description||'')}</div>
      ${myPhotos.length? `<div>${myPhotos.map(p=>`<img class="photo-thumb" src="${p.photo_base64}">`).join('')}</div>`:''}</td>
      <td class="num">${t.due_date||'—'}</td><td>${taskPill(t.status)}</td>
      <td style="text-align:right;">${t.requires_photo? `<button class="btn btn-accent btn-sm" onclick="triggerTaskPhoto('${cid}')">📷 Tomar foto</button>` : ''}</td></tr>`;
  }).join('');
  return `<div class="card"><h3>Mis tareas</h3>
  <div id="taskPhotoMsg"></div>
  <div class="table-scroll"><table><thead><tr><th>Tarea</th><th>Vence</th><th>Estado</th><th></th></tr></thead>
  <tbody>${rows || '<tr><td colspan="4" class="empty-state">No tienes tareas asignadas.</td></tr>'}</tbody></table></div>
  <input type="file" id="taskPhotoInput" accept="image/*" capture="environment" style="display:none;" onchange="handleTaskPhotoSelected(event)">
  </div>`;
}
function triggerTaskPhoto(cacheId){
  APP._pendingPhotoTask = cacheId;
  $('#taskPhotoInput').click();
}
function handleTaskPhotoSelected(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const task = APP.cache[APP._pendingPhotoTask];
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (e)=>{
    img.onload = async ()=>{
      const maxW = 1000;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.7);
      const {error} = await APP.sb.from('task_photos').insert({
        task_id: task.id, employee_id: APP.cache['_myEmpId'], company_id: APP.session.company_id, photo_base64: base64
      });
      const box = $('#taskPhotoMsg');
      if(error){ box.innerHTML = `<div class="msg msg-err">${esc(error.message)}</div>`; return; }
      box.innerHTML = `<div class="msg msg-ok">Foto subida correctamente.</div>`;
      renderEmployee();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = '';
}
function empAccountTab(){
  return `<div class="card" style="max-width:420px;"><h3>Cambiar mi clave</h3><div id="epMsg"></div>
  <div class="field"><label>Nueva clave</label><input id="epPass" type="password"></div>
  <div class="field"><label>Confirmar</label><input id="epPass2" type="password"></div>
  <button class="btn btn-primary" onclick="submitEmpPass()">Actualizar clave</button></div>`;
}
async function submitEmpPass(){
  const p1=$('#epPass').value, p2=$('#epPass2').value;
  if(!p1||p1.length<4) return $('#epMsg').innerHTML=`<div class="msg msg-err">Mínimo 4 caracteres.</div>`;
  if(p1!==p2) return $('#epMsg').innerHTML=`<div class="msg msg-err">No coinciden.</div>`;
  await APP.sb.rpc('set_company_user_password', {p_token: tok(), p_user_id: APP.session.id, p_new_password:p1});
  $('#epMsg').innerHTML = `<div class="msg msg-ok">Clave actualizada.</div>`;
}

/* ------------------------- EXCEL ------------------------- */
function exportToExcel(filename, dataArray){
  if(!dataArray || dataArray.length===0){ alert('No hay datos para exportar.'); return; }
  const ws = XLSX.utils.json_to_sheet(dataArray);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Datos');
  XLSX.writeFile(wb, filename);
}
